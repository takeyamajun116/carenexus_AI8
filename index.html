<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CareNexus - 次世代型看護ラダー・パスポート</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        trustBlue: '#1e3a8a',
                        coralPink: '#fb7185',
                        sunsetOrange: '#fb923c'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #e5e7eb; margin: 0; font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; }
        .app-container { max-width: 414px; margin: 0 auto; height: 100vh; background-color: #f8fafc; position: relative; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .toast-enter { animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes slideUp {
            from { transform: translateY(150%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .progress-ring__circle {
            transition: stroke-dashoffset 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [score, setScore] = useState(72);
            const [toast, setToast] = useState({ show: false, message: '', translation: '', pts: 0 });

            const showToast = (message, translation, pts) => {
                setToast({ show: true, message, translation, pts });
                setTimeout(() => {
                    setScore(prev => prev + pts);
                }, 600);
                setTimeout(() => setToast({ show: false, message: '', translation: '', pts: 0 }), 4000);
            };

            return (
                <div className="app-container">
                    {/* Header */}
                    <header className="bg-white shadow-sm px-4 py-3 flex items-center justify-between z-10 relative">
                        <div className="flex items-center space-x-2">
                            <img 
                                src="CareNexuslogo.png" 
                                alt="CareNexus" 
                                className="h-6 object-contain"
                                onError={(e) => {
                                    e.target.style.display = 'none';
                                    e.target.nextSibling.style.display = 'block';
                                }}
                            />
                            <span className="font-bold text-trustBlue text-lg hidden">CareNexus</span>
                        </div>
                        <div className="text-gray-400 text-sm flex space-x-4">
                            <span className="text-xs font-bold text-trustBlue bg-blue-50 px-2 py-1 rounded-full">JNA → VNA 翻訳エンジン稼働中</span>
                        </div>
                    </header>

                    {/* Main Content Area */}
                    <main className="flex-1 overflow-y-auto hide-scrollbar pb-24 relative">
                        {activeTab === 'home' && <HomeTab score={score} setActiveTab={setActiveTab} />}
                        {activeTab === 'record' && <RecordTab showToast={showToast} />}
                        {activeTab === 'passport' && <PassportTab score={score} />}
                        {activeTab === 'scout' && <ScoutTab score={score} />}

                        {/* Translation Toast Notification (翻訳トースト通知) */}
                        {toast.show && (
                            <div className="absolute bottom-6 left-4 right-4 bg-trustBlue text-white p-4 rounded-xl shadow-2xl toast-enter z-50 border border-blue-400">
                                <div className="flex items-start space-x-3">
                                    <div className="bg-gradient-to-br from-coralPink to-orange-400 text-white rounded-full w-10 h-10 flex-shrink-0 flex items-center justify-center font-bold shadow-inner">
                                        +{toast.pts}
                                    </div>
                                    <div className="flex-1">
                                        <p className="text-[10px] text-blue-200 mb-1"><i className="fa-solid fa-language mr-1"></i>VNAラダーへ自動翻訳完了</p>
                                        <p className="text-xs font-medium leading-tight mb-2 opacity-80 line-through decoration-gray-400">病棟: {toast.message}</p>
                                        <p className="text-sm font-bold leading-tight text-yellow-300">
                                            在宅: {toast.translation}
                                        </p>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Bottom Navigation */}
                    <nav className="bg-white border-t border-gray-200 flex justify-around absolute bottom-0 w-full z-20 pb-safe">
                        <NavItem icon="fa-house" label="ホーム" isActive={activeTab === 'home'} onClick={() => setActiveTab('home')} />
                        <NavItem icon="fa-pen-to-square" label="業務翻訳" isActive={activeTab === 'record'} onClick={() => setActiveTab('record')} />
                        <NavItem icon="fa-id-badge" label="パスポート" isActive={activeTab === 'passport'} onClick={() => setActiveTab('passport')} />
                        <NavItem icon="fa-envelope" label="スカウト" isActive={activeTab === 'scout'} onClick={() => setActiveTab('scout')} />
                    </nav>
                </div>
            );
        };

        const NavItem = ({ icon, label, isActive, onClick }) => (
            <button onClick={onClick} className={`flex-1 py-3 flex flex-col items-center justify-center transition-colors ${isActive ? 'text-trustBlue' : 'text-gray-400'}`}>
                <i className={`fa-solid ${icon} text-xl mb-1`}></i>
                <span className="text-[10px] font-medium">{label}</span>
            </button>
        );

        // --- タブコンテンツ ---

        const HomeTab = ({ score, setActiveTab }) => {
            const radius = 65;
            const circumference = 2 * Math.PI * radius;
            const strokeDashoffset = circumference - (score / 100) * circumference;

            return (
                <div className="p-5 space-y-6">
                    <div className="bg-white rounded-2xl shadow-sm p-6 flex flex-col items-center relative overflow-hidden border border-gray-100">
                        <div className="absolute top-0 w-full h-1.5 bg-gradient-to-r from-trustBlue to-coralPink"></div>
                        <h2 className="text-gray-500 text-xs font-bold tracking-wider mb-6">訪問看護レディネススコア</h2>
                        <div className="relative flex items-center justify-center">
                            <svg className="w-44 h-44">
                                <circle className="text-gray-50" strokeWidth="14" stroke="currentColor" fill="transparent" r={radius} cx="88" cy="88" />
                                <circle 
                                    className="text-trustBlue progress-ring__circle drop-shadow-md" 
                                    strokeWidth="14" 
                                    strokeDasharray={circumference} 
                                    strokeDashoffset={strokeDashoffset} 
                                    strokeLinecap="round" 
                                    stroke="currentColor" 
                                    fill="transparent" 
                                    r={radius} cx="88" cy="88" 
                                />
                            </svg>
                            <div className="absolute flex flex-col items-center justify-center">
                                <span className="text-5xl font-extrabold text-gray-800 tracking-tighter">{score}<span className="text-xl text-gray-400 font-medium ml-1">%</span></span>
                            </div>
                        </div>
                        <p className="text-xs text-gray-500 mt-6 text-center leading-relaxed">
                            あと <span className="font-bold text-coralPink">{100 - score}pt</span> でレディネス証明発行。<br/>今日の病棟業務を「翻訳」してみましょう。
                        </p>
                    </div>

                    <div className="bg-gradient-to-br from-indigo-50 to-blue-50 rounded-2xl shadow-sm p-5 border border-indigo-100">
                        <h3 className="text-trustBlue font-bold text-sm mb-2"><i className="fa-solid fa-bolt text-yellow-500 mr-2"></i>今日のレコメンド</h3>
                        <p className="text-xs text-gray-700 leading-relaxed mb-4">
                            JNAラダー基準の「終末期患者のACP支援」は、在宅での「多様な看取り支援力」として高く換算されます。本日経験しましたか？
                        </p>
                        <button onClick={() => setActiveTab('record')} className="bg-white text-trustBlue text-xs font-bold py-2.5 px-4 rounded-xl shadow-sm border border-trustBlue w-full transition active:bg-blue-50">
                            業務を記録・翻訳する <i className="fa-solid fa-arrow-right ml-1"></i>
                        </button>
                    </div>
                </div>
            );
        };

        const RecordTab = ({ showToast }) => {
            const [checked, setChecked] = useState({});

            const handleCheck = (id, jnaTask, vnaSkill, pts) => {
                if(!checked[id]) {
                    setChecked({...checked, [id]: true});
                    showToast(jnaTask, vnaSkill, pts);
                }
            };

            return (
                <div className="p-5">
                    <h2 className="text-xl font-extrabold text-gray-800 mb-2">業務翻訳エンジン</h2>
                    <p className="text-xs text-gray-500 mb-6 leading-relaxed">病棟での実践（JNA基準）をタップしてください。<br/>独自のアルゴリズムが訪問看護のスキルに自動変換します。</p>

                    {/* Domain 1: 実践・ケア */}
                    <div className="mb-6">
                        <h3 className="text-xs font-bold text-trustBlue mb-3 border-l-4 border-trustBlue pl-2">① ケア・実践領域</h3>
                        <div className="space-y-3">
                            <RecordItem id="1" jnaTask="複数患者の急変対応・トリアージ" vnaSkill="単独訪問時のリスクマネジメント力" pts={3} checked={checked["1"]} onClick={() => handleCheck("1", "複数患者の急変対応・トリアージ", "単独訪問時のリスクマネジメント力", 3)} />
                            <RecordItem id="2" jnaTask="レスピレーター（人工呼吸器）の管理" vnaSkill="高度な在宅医療処置・アセスメント力" pts={2} checked={checked["2"]} onClick={() => handleCheck("2", "レスピレーターの管理", "高度な在宅医療処置・アセスメント力", 2)} />
                        </div>
                    </div>

                    {/* Domain 2: 連携・協働 */}
                    <div className="mb-6">
                        <h3 className="text-xs font-bold text-coralPink mb-3 border-l-4 border-coralPink pl-2">② 連携・協働領域</h3>
                        <div className="space-y-3">
                            <RecordItem id="3" jnaTask="退院前カンファレンスの主導" vnaSkill="地域資源の活用と多職種連携力" pts={4} checked={checked["3"]} onClick={() => handleCheck("3", "退院前カンファレンスの主導", "地域資源の活用と多職種連携力", 4)} />
                        </div>
                    </div>

                    {/* Domain 3: 意思決定支援 */}
                    <div className="mb-6">
                        <h3 className="text-xs font-bold text-sunsetOrange mb-3 border-l-4 border-sunsetOrange pl-2">③ 意思決定支援領域</h3>
                        <div className="space-y-3">
                            <RecordItem id="4" jnaTask="終末期患者のACP（事前ケア計画）支援" vnaSkill="多様な価値観に基づく看取り支援力" pts={4} checked={checked["4"]} onClick={() => handleCheck("4", "終末期患者のACP支援", "多様な価値観に基づく看取り支援力", 4)} />
                        </div>
                    </div>

                    {/* Domain 4: 管理・教育 */}
                    <div className="mb-4">
                        <h3 className="text-xs font-bold text-purple-500 mb-3 border-l-4 border-purple-500 pl-2">④ 管理・教育領域</h3>
                        <div className="space-y-3">
                            <RecordItem id="5" jnaTask="リーダー業務・プリセプターによる新人指導" vnaSkill="業務の効率的運営・ステーション管理力" pts={3} checked={checked["5"]} onClick={() => handleCheck("5", "リーダー業務・新人指導", "業務の効率的運営・ステーション管理力", 3)} />
                        </div>
                    </div>
                </div>
            );
        };

        const RecordItem = ({ jnaTask, checked, onClick }) => (
            <div 
                onClick={onClick}
                className={`p-4 rounded-xl border-2 transition-all cursor-pointer flex items-center justify-between ${checked ? 'border-trustBlue bg-blue-50' : 'border-gray-100 bg-white shadow-sm hover:border-gray-200'}`}
            >
                <span className={`text-xs font-medium leading-snug pr-4 ${checked ? 'text-trustBlue font-bold' : 'text-gray-700'}`}>{jnaTask}</span>
                <div className={`w-6 h-6 rounded-full flex-shrink-0 flex items-center justify-center border-2 transition-colors ${checked ? 'bg-trustBlue border-trustBlue text-white' : 'border-gray-300'}`}>
                    {checked && <i className="fa-solid fa-check text-[10px]"></i>}
                </div>
            </div>
        );

        const PassportTab = ({ score }) => (
            <div className="p-5 space-y-5">
                <div className="bg-trustBlue rounded-2xl p-6 text-white shadow-lg relative overflow-hidden">
                    <i className="fa-solid fa-file-shield absolute -right-4 -bottom-4 text-8xl text-white opacity-10"></i>
                    <h2 className="text-[10px] font-bold opacity-70 tracking-widest mb-1">CAREER PASSPORT</h2>
                    <h1 className="text-xl font-bold mb-5">訪問看護レディネス証明書</h1>
                    <div className="flex justify-between items-end">
                        <div>
                            <p className="text-[10px] opacity-80 mb-1">現在地スコア</p>
                            <p className="text-4xl font-extrabold tracking-tighter">{score}<span className="text-lg font-normal ml-1">pt</span></p>
                        </div>
                        <div className="text-right">
                            <p className="text-[9px] opacity-80 mb-1">アルゴリズム監修</p>
                            <p className="text-[10px] font-bold bg-white/20 px-2 py-1 rounded backdrop-blur-sm">慶應・業界トップランナー陣</p>
                        </div>
                    </div>
                </div>

                <h3 className="font-bold text-gray-800 text-sm mt-6 mb-3">VNAコンピテンシー（東京都基準）</h3>
                <div className="grid grid-cols-2 gap-3">
                    <Badge icon="fa-stethoscope" label="看護実践能力" active={true} />
                    <Badge icon="fa-handshake-angle" label="多職種連携能力" active={score > 75} />
                    <Badge icon="fa-house-chimney-medical" label="療養・看取り支援" active={score > 80} />
                    <Badge icon="fa-chalkboard-user" label="管理・教育能力" active={score > 90} />
                </div>

                <div className="bg-white rounded-xl shadow-sm p-5 mt-4 border border-gray-100 relative">
                    <div className="absolute -top-3 left-4 bg-coralPink text-white text-[10px] font-bold px-3 py-1 rounded-full shadow-sm">AIキャリアサマリー</div>
                    <p className="text-xs text-gray-600 leading-relaxed mt-2">
                        病棟での<span className="font-bold text-trustBlue">「急変対応」</span>や<span className="font-bold text-trustBlue">「退院調整」</span>の経験データに基づき、あなたは在宅における<span className="font-bold text-coralPink">『単独でのリスクマネジメント力』</span>と<span className="font-bold text-coralPink">『多職種連携力』</span>において即戦力水準に達しています。面接時はこのパスポートを提示してください。
                    </p>
                </div>
            </div>
        );

        const Badge = ({ icon, label, active }) => (
            <div className={`flex flex-col items-center justify-center p-4 rounded-xl border-2 transition-all ${active ? 'bg-white border-trustBlue shadow-sm' : 'bg-gray-50 border-gray-100 opacity-60 grayscale'}`}>
                <div className={`w-10 h-10 rounded-full flex items-center justify-center mb-2 ${active ? 'bg-blue-50 text-trustBlue' : 'bg-gray-200 text-gray-400'}`}>
                    <i className={`fa-solid ${icon} text-lg`}></i>
                </div>
                <span className="text-[10px] font-bold text-gray-800 text-center">{label}</span>
            </div>
        );

        const ScoutTab = ({ score }) => (
            <div className="p-5 h-full flex flex-col">
                <h2 className="text-xl font-bold text-gray-800 mb-4">ハイエンド・スカウト</h2>
                
                {score >= 80 ? (
                    <div className="space-y-4 animate-fade-in">
                        <div className="bg-white rounded-2xl shadow-sm p-5 border-l-4 border-sunsetOrange relative overflow-hidden">
                            <span className="absolute top-0 right-0 bg-red-500 text-white text-[9px] font-bold px-3 py-1 rounded-bl-lg">NEW</span>
                            <div className="flex items-center space-x-3 mb-4">
                                <div className="w-10 h-10 bg-orange-50 rounded-full flex items-center justify-center text-sunsetOrange"><i className="fa-solid fa-building-user"></i></div>
                                <div>
                                    <h3 className="font-bold text-sm text-gray-800">〇〇訪問看護ステーション</h3>
                                    <p className="text-[10px] text-gray-500">東京都 世田谷区 / 大規模ステーション</p>
                                </div>
                            </div>
                            <p className="text-xs text-gray-700 leading-relaxed mb-4 bg-gray-50 p-3 rounded-lg">
                                「あなたのパスポートを拝見しました。病棟での『退院前カンファレンス』の実績から、当ステーションが求める『多職種連携力』を持つ即戦力だと確信しています。一度カジュアル面談でお話ししませんか？」
                            </p>
                            <button className="w-full bg-trustBlue text-white text-xs font-bold py-3 rounded-xl shadow-md active:bg-blue-800 transition">
                                スカウトに返信する
                            </button>
                        </div>
                    </div>
                ) : (
                    <div className="flex-1 flex flex-col items-center justify-center text-center px-4 mt-6">
                        <div className="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mb-4 shadow-inner">
                            <i className="fa-solid fa-lock text-3xl text-gray-400"></i>
                        </div>
                        <h3 className="text-gray-800 font-bold mb-2">プレミアムスカウト解放まで</h3>
                        <p className="text-xs text-gray-500 leading-relaxed">
                            レディネススコアが <span className="text-trustBlue font-bold text-sm">80pt</span> を超えると、あなたの「在宅適性」を高く評価するトップステーションから、ミスマッチのないスカウトが届きます。<br/><br/>あと <span className="font-bold text-coralPink">{80 - score}pt</span> です。業務翻訳を続けましょう！
                        </p>
                    </div>
                )}
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
