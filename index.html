<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CareNexus - Career Analytics & Passport</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#0f172a',      // 信頼感のあるダークネイビー
                        trustBlue: '#2563eb', // アクションブルー
                        surface: '#f8fafc',   // 背景シルバーグレー
                        borderGray: '#e2e8f0'
                    },
                    fontFamily: {
                        sans: ['"Helvetica Neue"', 'Arial', '"Hiragino Kaku Gothic ProN"', '"Hiragino Sans"', 'Meiryo', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f1f5f9; margin: 0; -webkit-font-smoothing: antialiased; }
        .app-container { max-width: 414px; margin: 0 auto; height: 100vh; background-color: #ffffff; position: relative; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .progress-ring__circle { transition: stroke-dashoffset 1s ease-out; transform: rotate(-90deg); transform-origin: 50% 50%; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- データ定義 ---
        const tasksData = [
            {
                id: 1,
                category: "実践・ケア領域",
                title: "急変対応・トリアージ",
                examples: "心停止の初期対応、アナフィラキシーショック、急激なSpO2低下時のアセスメントと迅速な医師報告",
                vnaSkill: "単独訪問時のリスクマネジメント力",
                insight: "病棟では医師がすぐ駆けつける環境での初期対応ですが、訪問看護では「たった一人で状態悪化の兆候を早期発見し、主治医へ的確に電話で状況を伝え、指示を仰ぐ」という究極のアセスメント力が求められます。自律した急変対応経験は、在宅でのリスク回避の土台となります。",
                pts: 5
            },
            {
                id: 2,
                category: "連携・協働領域",
                title: "退院前カンファレンス・退院支援",
                examples: "MSWやリハ職との調整、退院サマリーの共有、ケアマネジャーへの申し送り",
                vnaSkill: "地域資源の活用と多職種連携力",
                insight: "院内での多職種調整の経験は、在宅においてケアマネジャーや他事業所と連携し、患者の生活を地域全体で支えるコーディネート力に直結します。退院後の生活を見据えたアセスメントは、訪問看護の核となるスキルです。",
                pts: 5
            },
            {
                id: 3,
                category: "意思決定支援領域",
                title: "終末期患者のACP支援",
                examples: "予後告知後の精神的フォロー、家族を含めた看取りの希望聴取、DNAR確認",
                vnaSkill: "多様な価値観に基づく看取り支援力",
                insight: "病院という非日常空間での同意サポート経験は、患者の自宅という「日常」において、家族をエンパワメントし、その人らしい最期を支える高度な倫理的判断力へと昇華されます。",
                pts: 4
            }
        ];

        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [score, setScore] = useState(65);
            // 評価ステータス保存 { taskId: level(0~3) }
            const [inventory, setInventory] = useState({ 1: 0, 2: 0, 3: 0 });
            const [showInsightModal, setShowInsightModal] = useState(false);
            const [newlyAcquired, setNewlyAcquired] = useState([]);

            const handleUpdateInventory = (id, level) => {
                setInventory(prev => ({ ...prev, [id]: level }));
            };

            const submitInventory = () => {
                let gainedPts = 0;
                let acquired = [];
                tasksData.forEach(task => {
                    const level = inventory[task.id];
                    // レベル2(自律)以上でスキル認定
                    if (level >= 2) {
                        gainedPts += task.pts;
                        acquired.push(task);
                    }
                });
                
                if (acquired.length > 0) {
                    setScore(prev => Math.min(prev + gainedPts, 100));
                    setNewlyAcquired(acquired);
                    setShowInsightModal(true);
                } else {
                    // 自律レベルに達していない場合はホームへ
                    setActiveTab('home');
                }
            };

            return (
                <div className="app-container">
                    {/* Header */}
                    <header className="px-5 py-4 flex items-center justify-between bg-navy text-white z-10">
                        <div className="flex items-center space-x-2">
                            <span className="font-bold tracking-wider text-sm">CareNexus</span>
                        </div>
                        <div className="text-xs font-medium text-slate-300">
                            Professional Portal
                        </div>
                    </header>

                    {/* Main Content Area */}
                    <main className="flex-1 overflow-y-auto hide-scrollbar bg-surface relative pb-20">
                        {activeTab === 'home' && <HomeTab score={score} setActiveTab={setActiveTab} />}
                        {activeTab === 'record' && <RecordTab inventory={inventory} handleUpdateInventory={handleUpdateInventory} submitInventory={submitInventory} />}
                        {activeTab === 'passport' && <PassportTab score={score} inventory={inventory} />}
                        {activeTab === 'scout' && <ScoutTab score={score} />}

                        {/* Insight Modal (翻訳結果とインサイトの提示) */}
                        {showInsightModal && (
                            <div className="absolute inset-0 bg-navy/80 backdrop-blur-sm z-50 flex flex-col items-center justify-end animate-fade-in">
                                <div className="bg-white w-full h-[85%] rounded-t-3xl p-6 overflow-y-auto shadow-2xl flex flex-col">
                                    <div className="flex justify-between items-center mb-6">
                                        <h2 className="text-lg font-bold text-navy">キャリア翻訳レポート</h2>
                                        <button onClick={() => { setShowInsightModal(false); setActiveTab('passport'); }} className="w-8 h-8 bg-slate-100 rounded-full text-slate-500">
                                            <i className="fa-solid fa-xmark"></i>
                                        </button>
                                    </div>
                                    <p className="text-sm text-slate-600 mb-6">今月の棚卸しにより、以下の病棟経験が在宅スキルとして高く評価（翻訳）されました。</p>
                                    
                                    <div className="space-y-6 flex-1">
                                        {newlyAcquired.map(task => (
                                            <div key={task.id} className="bg-slate-50 border border-borderGray rounded-xl p-5">
                                                <div className="flex items-center space-x-2 mb-2">
                                                    <span className="bg-trustBlue text-white text-[10px] font-bold px-2 py-1 rounded uppercase tracking-wider">VNA Skill</span>
                                                    <span className="text-sm font-bold text-navy">{task.vnaSkill}</span>
                                                </div>
                                                <p className="text-[11px] text-slate-500 mb-4 pb-4 border-b border-borderGray">
                                                    評価元: {task.title}（自律レベル）
                                                </p>
                                                <h4 className="text-xs font-bold text-slate-700 mb-2"><i className="fa-solid fa-lightbulb text-amber-500 mr-2"></i>VNA Insight（在宅医療への接続）</h4>
                                                <p className="text-xs text-slate-600 leading-relaxed font-medium">
                                                    {task.insight}
                                                </p>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="mt-6">
                                        <button onClick={() => { setShowInsightModal(false); setActiveTab('passport'); }} className="w-full bg-navy text-white text-sm font-bold py-4 rounded-xl shadow-lg">
                                            パスポートを確認する
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Bottom Navigation */}
                    <nav className="bg-white border-t border-borderGray flex justify-around absolute bottom-0 w-full z-20 pb-safe">
                        <NavItem icon="fa-chart-pie" label="Dashboard" isActive={activeTab === 'home'} onClick={() => setActiveTab('home')} />
                        <NavItem icon="fa-list-check" label="Inventory" isActive={activeTab === 'record'} onClick={() => setActiveTab('record')} />
                        <NavItem icon="fa-id-card" label="Passport" isActive={activeTab === 'passport'} onClick={() => setActiveTab('passport')} />
                        <NavItem icon="fa-building" label="Scouts" isActive={activeTab === 'scout'} onClick={() => setActiveTab('scout')} />
                    </nav>
                </div>
            );
        };

        const NavItem = ({ icon, label, isActive, onClick }) => (
            <button onClick={onClick} className={`flex-1 py-3 flex flex-col items-center justify-center transition-colors ${isActive ? 'text-trustBlue' : 'text-slate-400'}`}>
                <i className={`fa-solid ${icon} text-lg mb-1`}></i>
                <span className="text-[9px] font-bold tracking-wider uppercase">{label}</span>
            </button>
        );

        // --- タブ：ダッシュボード ---
        const HomeTab = ({ score, setActiveTab }) => {
            const radius = 60;
            const circumference = 2 * Math.PI * radius;
            const strokeDashoffset = circumference - (score / 100) * circumference;

            return (
                <div className="p-6 space-y-6 fade-in">
                    <h1 className="text-xl font-bold text-navy mb-1">Overview</h1>
                    <p className="text-xs text-slate-500 mb-6">現在のあなたの市場価値とレディネス</p>

                    <div className="bg-white rounded-2xl shadow-sm border border-borderGray p-6 flex items-center justify-between">
                        <div>
                            <p className="text-[10px] font-bold text-slate-400 tracking-widest uppercase mb-1">VNA Readiness</p>
                            <div className="flex items-baseline space-x-1">
                                <span className="text-4xl font-black text-navy tracking-tighter">{score}</span>
                                <span className="text-sm font-bold text-slate-400">%</span>
                            </div>
                            <p className="text-[10px] text-trustBlue font-bold mt-2 bg-blue-50 px-2 py-1 rounded inline-block">認定まであと {100 - score} pt</p>
                        </div>
                        <div className="relative">
                            <svg className="w-28 h-28">
                                <circle className="text-slate-100" strokeWidth="8" stroke="currentColor" fill="transparent" r={radius} cx="56" cy="56" />
                                <circle 
                                    className="text-trustBlue progress-ring__circle" 
                                    strokeWidth="8" strokeDasharray={circumference} strokeDashoffset={strokeDashoffset} strokeLinecap="round" stroke="currentColor" fill="transparent" r={radius} cx="56" cy="56" 
                                />
                            </svg>
                        </div>
                    </div>

                    <div className="bg-navy text-white rounded-2xl p-6 relative overflow-hidden shadow-md">
                        <div className="absolute -right-4 -top-4 opacity-10"><i className="fa-solid fa-calendar-check text-8xl"></i></div>
                        <h3 className="text-sm font-bold mb-2">今月のキャリア棚卸し</h3>
                        <p className="text-xs text-slate-300 leading-relaxed mb-4">
                            月に一度、病棟での実践を振り返りましょう。厳格な基準であなたのスキルを在宅医療の文脈に翻訳します。
                        </p>
                        <button onClick={() => setActiveTab('record')} className="bg-trustBlue text-white text-xs font-bold py-3 px-4 rounded-lg shadow w-full hover:bg-blue-700 transition">
                            今月の棚卸しを開始する
                        </button>
                    </div>
                </div>
            );
        };

        // --- タブ：月次棚卸し（厳密な4段階評価） ---
        const RecordTab = ({ inventory, handleUpdateInventory, submitInventory }) => {
            return (
                <div className="p-6 h-full flex flex-col fade-in">
                    <div className="mb-6">
                        <h1 className="text-xl font-bold text-navy mb-1">Career Inventory</h1>
                        <p className="text-xs text-slate-500 leading-relaxed">
                            以下の具体例を参考に、現在のあなたの実践レベルを最も正確に表すステータスを選択してください。（自律レベル以上で評価に反映されます）
                        </p>
                    </div>

                    <div className="space-y-8 pb-6 flex-1">
                        {tasksData.map((task) => (
                            <InventoryItem 
                                key={task.id} 
                                task={task} 
                                currentLevel={inventory[task.id]} 
                                onChange={(level) => handleUpdateInventory(task.id, level)} 
                            />
                        ))}
                    </div>

                    <div className="mt-4">
                        <button onClick={submitInventory} className="w-full bg-navy text-white text-sm font-bold py-4 rounded-xl shadow-lg active:bg-slate-800 transition">
                            評価を確定し、翻訳する
                        </button>
                    </div>
                </div>
            );
        };

        const InventoryItem = ({ task, currentLevel, onChange }) => {
            const levels = [
                { val: 0, label: "未経験" },
                { val: 1, label: "指導下で実施" },
                { val: 2, label: "自律して実践" },
                { val: 3, label: "他者を指導" }
            ];

            return (
                <div className="bg-white border border-borderGray rounded-xl p-5 shadow-sm">
                    <div className="mb-4">
                        <span className="text-[10px] font-bold text-trustBlue tracking-wider">{task.category}</span>
                        <h3 className="text-sm font-bold text-navy mt-1 mb-2">{task.title}</h3>
                        <div className="bg-slate-50 p-3 rounded-lg border border-slate-100">
                            <p className="text-[10px] font-bold text-slate-500 mb-1">【具体例】</p>
                            <p className="text-[11px] text-slate-600 leading-relaxed">{task.examples}</p>
                        </div>
                    </div>
                    
                    <div>
                        <p className="text-[10px] font-bold text-slate-400 mb-2">習熟度ステータス</p>
                        <div className="grid grid-cols-2 gap-2">
                            {levels.map(lvl => (
                                <button 
                                    key={lvl.val}
                                    onClick={() => onChange(lvl.val)}
                                    className={`py-2 px-1 text-[10px] font-bold rounded flex items-center justify-center border transition-all
                                        ${currentLevel === lvl.val 
                                            ? 'bg-trustBlue border-trustBlue text-white shadow-sm' 
                                            : 'bg-white border-borderGray text-slate-500 hover:bg-slate-50'}`}
                                >
                                    {currentLevel === lvl.val && <i className="fa-solid fa-check mr-1"></i>}
                                    {lvl.label}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // --- タブ：パスポート（証明書） ---
        const PassportTab = ({ score, inventory }) => {
            return (
                <div className="p-6 space-y-6 fade-in">
                    <div className="bg-navy rounded-2xl p-6 text-white shadow-lg relative overflow-hidden">
                        <div className="absolute right-0 top-0 w-32 h-32 bg-trustBlue rounded-full blur-[50px] opacity-20"></div>
                        <div className="flex justify-between items-start mb-6">
                            <div>
                                <p className="text-[9px] font-bold opacity-60 tracking-widest uppercase mb-1">Official Credentials</p>
                                <h1 className="text-lg font-bold">VNA Career Passport</h1>
                            </div>
                            <div className="w-8 h-8 bg-white/10 backdrop-blur rounded flex items-center justify-center">
                                <i className="fa-solid fa-qrcode text-sm"></i>
                            </div>
                        </div>
                        
                        <div className="flex items-end space-x-6 border-t border-white/10 pt-4">
                            <div>
                                <p className="text-[9px] opacity-60 uppercase mb-1">Score</p>
                                <p className="text-2xl font-black">{score}</p>
                            </div>
                            <div>
                                <p className="text-[9px] opacity-60 uppercase mb-1">Status</p>
                                <p className="text-xs font-bold text-emerald-400"><i className="fa-solid fa-circle text-[8px] mr-1"></i>Verified</p>
                            </div>
                        </div>
                    </div>

                    <div>
                        <h3 className="text-sm font-bold text-navy mb-4">認定済みスキル（自律レベル以上）</h3>
                        <div className="space-y-3">
                            {tasksData.map(task => {
                                const level = inventory[task.id];
                                const isVerified = level >= 2;
                                return (
                                    <div key={task.id} className={`p-4 rounded-xl border flex items-center justify-between transition-all ${isVerified ? 'bg-white border-trustBlue shadow-sm' : 'bg-slate-50 border-borderGray opacity-50'}`}>
                                        <div>
                                            <p className={`text-xs font-bold ${isVerified ? 'text-navy' : 'text-slate-500'}`}>{task.vnaSkill}</p>
                                            <p className="text-[10px] text-slate-400 mt-1">
                                                {isVerified ? `病棟実績: ${task.title}` : '未認定（自律的実践が必要）'}
                                            </p>
                                        </div>
                                        {isVerified && <i className="fa-solid fa-shield-check text-trustBlue text-lg"></i>}
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        // --- タブ：スカウト ---
        const ScoutTab = ({ score }) => (
            <div className="p-6 h-full flex flex-col fade-in">
                <h2 className="text-xl font-bold text-navy mb-1">Connect</h2>
                <p className="text-xs text-slate-500 mb-6">厳格な審査を通過したステーションからのオファー</p>

                {score >= 70 ? (
                    <div className="space-y-4">
                        <div className="bg-white rounded-2xl shadow-sm border border-borderGray overflow-hidden relative">
                            <div className="h-1 bg-trustBlue w-full"></div>
                            <div className="p-5">
                                <div className="flex items-start justify-between mb-4">
                                    <div className="flex items-center space-x-3">
                                        <div className="w-10 h-10 bg-slate-100 rounded text-slate-600 flex items-center justify-center">
                                            <i className="fa-solid fa-building"></i>
                                        </div>
                                        <div>
                                            <h3 className="font-bold text-sm text-navy">慶應・広尾訪問看護ステーション</h3>
                                            <p className="text-[10px] text-slate-500">東京都 渋谷区 / 大規模・教育体制充実</p>
                                        </div>
                                    </div>
                                </div>
                                <div className="bg-slate-50 p-4 rounded-lg border border-slate-100 mb-4">
                                    <p className="text-xs text-slate-700 leading-relaxed font-medium">
                                        「あなたのパスポートを拝見しました。病棟での『自律した急変対応』と『退院支援』の実績は、当ステーションが求めるリスクマネジメント力そのものです。まずは見学やカジュアル面談でお話ししませんか？」
                                    </p>
                                </div>
                                <div className="flex space-x-3">
                                    <button className="flex-1 border border-borderGray text-navy text-xs font-bold py-3 rounded-lg hover:bg-slate-50 transition">
                                        詳細を見る
                                    </button>
                                    <button className="flex-1 bg-navy text-white text-xs font-bold py-3 rounded-lg hover:bg-slate-800 transition shadow-sm">
                                        面談を希望する
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                ) : (
                    <div className="flex-1 flex flex-col items-center justify-center text-center p-6 bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200">
                        <i className="fa-solid fa-lock text-3xl text-slate-300 mb-3"></i>
                        <h3 className="text-sm font-bold text-slate-500 mb-2">プレミアムスカウトはロックされています</h3>
                        <p className="text-xs text-slate-400 leading-relaxed">
                            レディネススコアが <span className="font-bold text-navy">70pt</span> に達すると、あなたの証明されたスキルにマッチする優良ステーションからのスカウトが解放されます。
                        </p>
                    </div>
                )}
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
