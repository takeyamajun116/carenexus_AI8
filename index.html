<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CareNexus - 寄り添うキャリア翻訳アプリ</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        trustBlue: '#1e3a8a',
                        coralPink: '#fb7185',
                        sage: '#f0f9f1'
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 3s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f1f5f9; margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif; }
        .app-container { max-width: 414px; margin: 0 auto; height: 100vh; background-color: #ffffff; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* スワイプカードのアニメーション */
        .card-swipe-right { transform: translateX(200%) rotate(30deg); opacity: 0; transition: 0.5s; }
        .card-swipe-left { transform: translateX(-200%) rotate(-30deg); opacity: 0; transition: 0.5s; }
        .card-in { transform: translateX(0) rotate(0); opacity: 1; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* 呼吸するリング */
        .breathing-ring { transition: stroke-dashoffset 1.5s ease-in-out; transform: rotate(-90deg); transform-origin: 50% 50%; }
        
        /* グラデーションテキスト */
        .grad-text { background: linear-gradient(to right, #1e3a8a, #fb7185); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [score, setScore] = useState(68);
            const [history, setHistory] = useState([
                { id: 101, title: 'CVポート管理', date: '昨日', pts: 2 },
                { id: 102, title: '多職種カンファ', date: '2日前', pts: 4 }
            ]);
            const [toast, setToast] = useState({ show: false, message: '', translation: '', pts: 0 });

            const triggerTranslation = (jnaTask, vnaSkill, pts) => {
                setToast({ show: true, message: jnaTask, translation: vnaSkill, pts });
                setTimeout(() => setScore(prev => prev + pts), 600);
                setHistory(prev => [{ id: Date.now(), title: jnaTask, date: 'たった今', pts }, ...prev]);
                setTimeout(() => setToast({ show: false, message: '', translation: '', pts: 0 }), 4000);
            };

            return (
                <div className="app-container">
                    {/* Header: ロゴのみのシンプル設計 */}
                    <header className="px-6 py-4 flex items-center justify-between border-b border-gray-50 bg-white/80 backdrop-blur-md sticky top-0 z-50">
                        <img src="CareNexuslogo.png" alt="CareNexus" className="h-7 object-contain" onError={(e) => { e.target.outerHTML = '<span class="font-bold text-trustBlue">CareNexus</span>'; }} />
                        <div className="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-400">
                            <i className="fa-regular fa-user text-sm"></i>
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto hide-scrollbar pb-24">
                        {activeTab === 'home' && <HomeTab score={score} history={history} />}
                        {activeTab === 'record' && <RecordTab onTranslate={triggerTranslation} />}
                        {activeTab === 'passport' && <PassportTab score={score} />}
                        {activeTab === 'scout' && <ScoutTab score={score} />}

                        {/* 翻訳ポップアップ（自己肯定感爆上げエフェクト） */}
                        {toast.show && (
                            <div className="fixed bottom-24 left-4 right-4 bg-white rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.1)] p-5 border border-blue-50 z-[100] animate-bounce-in">
                                <div className="flex items-center space-x-4">
                                    <div className="w-12 h-12 bg-gradient-to-br from-trustBlue to-coralPink rounded-full flex items-center justify-center text-white shadow-lg animate-pulse">
                                        <i className="fa-solid fa-wand-magic-sparkles"></i>
                                    </div>
                                    <div className="flex-1">
                                        <p className="text-[10px] font-bold text-trustBlue tracking-widest uppercase opacity-60">Success Translation</p>
                                        <p className="text-sm font-bold text-gray-800 leading-tight">在宅スキル「{toast.translation}」を獲得！</p>
                                        <p className="text-[11px] text-gray-400 mt-1">病棟経験が価値に変わりました（+{toast.pts}pt）</p>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Navbar: 認知的負荷を下げたアイコン配置 */}
                    <nav className="fixed bottom-0 w-full max-w-[414px] bg-white/90 backdrop-blur-lg border-t border-gray-100 flex justify-around py-3 pb-6 z-50">
                        <NavItem icon="fa-house" label="Home" active={activeTab === 'home'} onClick={() => setActiveTab('home')} />
                        <NavItem icon="fa-bolt-lightning" label="Log" active={activeTab === 'record'} onClick={() => setActiveTab('record')} />
                        <NavItem icon="fa-leaf" label="Tree" active={activeTab === 'passport'} onClick={() => setActiveTab('passport')} />
                        <NavItem icon="fa-heart" label="Connect" active={activeTab === 'scout'} onClick={() => setActiveTab('scout')} />
                    </nav>
                </div>
            );
        };

        const NavItem = ({ icon, label, active, onClick }) => (
            <button onClick={onClick} className={`flex flex-col items-center transition-all ${active ? 'text-trustBlue scale-110' : 'text-gray-300'}`}>
                <div className={`w-10 h-10 rounded-2xl flex items-center justify-center mb-1 ${active ? 'bg-blue-50' : ''}`}>
                    <i className={`fa-solid ${icon} text-lg`}></i>
                </div>
                <span className="text-[9px] font-bold tracking-tighter uppercase">{label}</span>
            </button>
        );

        // --- タブ：ホーム（癒やしと振り返り） ---
        const HomeTab = ({ score, history }) => {
            const radius = 70;
            const circum = 2 * Math.PI * radius;
            const offset = circum - (score / 100) * circum;

            return (
                <div className="p-6 space-y-8 animate-in fade-in duration-500">
                    <div>
                        <p className="text-gray-400 text-xs font-bold uppercase tracking-widest mb-1">Welcome back</p>
                        <h1 className="text-2xl font-bold text-gray-800">夜勤、本当にお疲れ様でした。</h1>
                    </div>

                    <div className="relative flex flex-col items-center py-4">
                        <svg className="w-48 h-48 drop-shadow-[0_10px_20px_rgba(30,58,138,0.1)]">
                            <circle className="text-slate-50" strokeWidth="12" stroke="currentColor" fill="transparent" r={radius} cx="96" cy="96" />
                            <circle className="text-trustBlue breathing-ring animate-pulse-slow" strokeWidth="12" strokeDasharray={circum} strokeDashoffset={offset} strokeLinecap="round" stroke="currentColor" fill="transparent" r={radius} cx="96" cy="96" />
                        </svg>
                        <div className="absolute inset-0 flex flex-col items-center justify-center">
                            <span className="text-5xl font-black text-slate-800 tracking-tighter">{score}%</span>
                            <span className="text-[10px] font-bold text-slate-400 tracking-widest uppercase">Readiness</span>
                        </div>
                    </div>

                    <div>
                        <h3 className="text-sm font-bold text-gray-800 mb-4 flex items-center">
                            <i className="fa-solid fa-clock-rotate-left mr-2 text-trustBlue"></i>最近の翻訳履歴
                        </h3>
                        <div className="space-y-3">
                            {history.map(item => (
                                <div key={item.id} className="bg-white border border-gray-100 p-4 rounded-2xl flex items-center justify-between shadow-sm">
                                    <div>
                                        <p className="text-xs font-bold text-gray-700">{item.title}</p>
                                        <p className="text-[10px] text-gray-400">{item.date} に価値を証明</p>
                                    </div>
                                    <span className="text-xs font-black text-trustBlue">+{item.pts}pt</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // --- タブ：業務翻訳（スワイプUI） ---
        const RecordTab = ({ onTranslate }) => {
            const cards = [
                { id: 1, q: "今日、急変対応やトリアージを経験しましたか？", jna: "急変対応", vna: "リスクマネジメント力", pts: 4 },
                { id: 2, q: "退院前カンファレンスで発言や調整をしましたか？", jna: "退院調整", vna: "多職種連携・調整力", pts: 5 },
                { id: 3, q: "終末期患者さんの意思決定に寄り添いましたか？", jna: "ACP支援", vna: "看取り支援・倫理判断力", pts: 4 },
                { id: 4, q: "後輩の指導やリーダー業務を担当しましたか？", jna: "後輩指導", vna: "ステーション運営能力", pts: 3 },
            ];
            const [index, setIndex] = useState(0);
            const [swipeDir, setSwipeDir] = useState('card-in');

            const handleAction = (isYes) => {
                setSwipeDir(isYes ? 'card-swipe-right' : 'card-swipe-left');
                if(isYes) onTranslate(cards[index].jna, cards[index].vna, cards[index].pts);
                
                setTimeout(() => {
                    setIndex(prev => (prev + 1) % cards.length);
                    setSwipeDir('card-in');
                }, 500);
            };

            return (
                <div className="p-6 h-full flex flex-col items-center justify-center">
                    <div className="text-center mb-10 px-4">
                        <h2 className="text-xl font-bold text-gray-800 mb-2">今日の「当たり前」を<br/>価値に変える。</h2>
                        <p className="text-xs text-gray-400">当てはまるものをスワイプ、またはタップしてください</p>
                    </div>

                    <div className="relative w-full aspect-[4/5] flex items-center justify-center">
                        <div className={`absolute w-full h-full bg-white rounded-[40px] shadow-[0_30px_60px_rgba(0,0,0,0.12)] border border-blue-50 p-8 flex flex-col items-center justify-center text-center ${swipeDir}`}>
                            <div className="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mb-8 text-trustBlue animate-float">
                                <i className="fa-solid fa-hospital-user text-3xl"></i>
                            </div>
                            <p className="text-lg font-bold leading-relaxed text-gray-800">{cards[index].q}</p>
                        </div>
                    </div>

                    <div className="flex space-x-6 mt-12 w-full px-10">
                        <button onClick={() => handleAction(false)} className="flex-1 py-4 bg-slate-100 rounded-2xl text-slate-400 active:scale-95 transition">
                            <i className="fa-solid fa-xmark text-xl"></i>
                        </button>
                        <button onClick={() => handleAction(true)} className="flex-1 py-4 bg-gradient-to-r from-trustBlue to-blue-700 rounded-2xl text-white shadow-lg active:scale-95 transition">
                            <i className="fa-solid fa-check text-xl"></i>
                        </button>
                    </div>
                </div>
            );
        };

        // --- タブ：スキルツリー（パスポート） ---
        const PassportTab = ({ score }) => (
            <div className="p-6 space-y-8">
                <div className="bg-slate-900 rounded-[32px] p-8 text-white relative overflow-hidden shadow-2xl">
                    <div className="absolute top-0 right-0 w-32 h-32 bg-coralPink rounded-full blur-[60px] opacity-20"></div>
                    <p className="text-[10px] font-black tracking-[0.2em] opacity-40 mb-1 uppercase">Passport Level</p>
                    <h2 className="text-3xl font-black mb-6 italic">Ready to Visit</h2>
                    <div className="flex justify-between items-end">
                        <div className="text-center border-r border-white/10 pr-6">
                            <p className="text-[9px] opacity-40 uppercase font-bold">Skills</p>
                            <p className="text-xl font-bold">12</p>
                        </div>
                        <div className="text-center px-6">
                            <p className="text-[9px] opacity-40 uppercase font-bold">Score</p>
                            <p className="text-xl font-bold">{score}</p>
                        </div>
                        <div className="text-right">
                            <p className="text-[9px] opacity-40 uppercase font-bold">Cert</p>
                            <i className="fa-solid fa-circle-check text-coralPink"></i>
                        </div>
                    </div>
                </div>

                <div>
                    <h3 className="text-sm font-bold text-gray-800 mb-6 flex items-center">
                        <i className="fa-solid fa-seedling mr-2 text-trustBlue"></i>育っている在宅スキル
                    </h3>
                    <div className="grid grid-cols-2 gap-4">
                        <TreeNodes label="アセスメント力" active={true} />
                        <TreeNodes label="多職種連携" active={score > 70} />
                        <TreeNodes label="看取り支援" active={score > 80} />
                        <TreeNodes label="ステーション管理" active={score > 90} />
                    </div>
                </div>

                <div className="bg-blue-50/50 p-6 rounded-3xl border border-blue-100">
                    <p className="text-[10px] font-bold text-trustBlue mb-2">AI Career Insight</p>
                    <p className="text-xs leading-relaxed text-gray-600 font-medium">
                        「病棟での急変対応経験」があなたの強みです。これは在宅では「一人で判断する自信」として高く評価されます。もうすぐ認定レベルです。
                    </p>
                </div>
            </div>
        );

        const TreeNodes = ({ label, active }) => (
            <div className={`p-4 rounded-2xl border-2 flex flex-col items-center justify-center space-y-2 transition-all ${active ? 'bg-white border-trustBlue shadow-sm' : 'bg-gray-50 border-gray-100 opacity-40'}`}>
                <div className={`w-10 h-10 rounded-full flex items-center justify-center ${active ? 'bg-blue-50 text-trustBlue' : 'bg-gray-100'}`}>
                    <i className={`fa-solid ${active ? 'fa-leaf' : 'fa-lock'} text-sm`}></i>
                </div>
                <span className="text-[10px] font-bold text-gray-800">{label}</span>
            </div>
        );

        // --- タブ：スカウト（Connect） ---
        const ScoutTab = ({ score }) => (
            <div className="p-6">
                <h2 className="text-2xl font-black text-gray-800 mb-2">新たな出会い</h2>
                <p className="text-xs text-gray-400 mb-8">あなたの価値を認めるステーションが待っています</p>

                {score >= 70 ? (
                    <div className="space-y-6">
                        <div className="group bg-white rounded-[32px] overflow-hidden border border-gray-100 shadow-sm active:scale-[0.98] transition">
                            <div className="h-40 bg-slate-200 relative">
                                <div className="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                                <div className="absolute bottom-4 left-4 text-white">
                                    <h4 className="font-bold text-sm">あおぞら訪問看護ステーション</h4>
                                    <p className="text-[10px] opacity-80">東京都 世田谷区</p>
                                </div>
                                <div className="absolute top-4 right-4 bg-white/20 backdrop-blur-md text-white text-[9px] font-bold px-3 py-1 rounded-full uppercase">Top Tier</div>
                            </div>
                            <div className="p-6">
                                <p className="text-xs text-gray-600 leading-relaxed mb-6">
                                    「病棟での多職種連携スキル、素晴らしいですね。在宅でのチーム医療を支える要としてお迎えしたいです。まずは見学からいかがですか？」
                                </p>
                                <button className="w-full py-4 bg-trustBlue text-white rounded-2xl text-xs font-bold shadow-lg shadow-blue-200 active:bg-blue-800">
                                    15分だけカジュアルに話す
                                </button>
                            </div>
                        </div>
                    </div>
                ) : (
                    <div className="text-center py-20 bg-slate-50 rounded-[40px] border-2 border-dashed border-slate-200">
                        <i className="fa-solid fa-lock text-4xl text-slate-200 mb-4"></i>
                        <p className="text-sm font-bold text-slate-400">レディネス 70% で解放</p>
                        <p className="text-[10px] text-slate-300 mt-2">あと少しでステーションから<br/>お声がかかるようになります。</p>
                    </div>
                )}
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
